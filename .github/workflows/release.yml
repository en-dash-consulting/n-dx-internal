# Automated npm releases via Changesets
#
# Flow:
# 1. PRs merged to main with .changeset/ files trigger this workflow
# 2. The "Version Packages" PR is auto-created/updated with bumped versions + changelog
# 3. Merging the "Version Packages" PR triggers npm publish + git tags
#
# Requires NPM_TOKEN secret (granular access token scoped to @n-dx/*).
# Create at npmjs.com → Access Tokens → Granular Access Token.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check obfuscated code policy
        run: pnpm security:obfuscation

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm -r run test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish --access public
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
