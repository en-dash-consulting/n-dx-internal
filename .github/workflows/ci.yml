# GitHub Actions — PR validation and main branch CI for n-dx
#
# Replicates the pipeline previously defined in bitbucket-pipelines.yml.
# Steps: install → build → typecheck → PR check (build + rex validate)
#
# Node 22 LTS. Exact pnpm version managed by corepack via packageManager
# field in package.json.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: PR check
        run: pnpm pr-check
