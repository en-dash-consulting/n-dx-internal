# GitHub Actions — PR validation and main branch CI for n-dx
#
# Replicates the pipeline previously defined in bitbucket-pipelines.yml.
# Steps: install → build → typecheck → PR check (build + rex validate)
#
# Node 22 LTS. Exact pnpm version managed by corepack via packageManager
# field in package.json.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check no source maps in publish
        run: |
          MAPS=""
          for pkg in packages/*/; do
            [ -f "$pkg/package.json" ] || continue
            FOUND=$(cd "$pkg" && pnpm pack --dry-run 2>&1 | grep '\.map$' || true)
            if [ -n "$FOUND" ]; then
              MAPS="$MAPS\n$pkg:\n$FOUND"
            fi
          done
          if [ -n "$MAPS" ]; then
            echo -e "Source map files would be published to npm:\n$MAPS"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Docs build
        run: pnpm docs:build

      - name: PR check
        run: pnpm pr-check

      - name: Run unit tests
        run: pnpm -r run test

      - name: Require changeset
        # Skip on the Changesets release PR: that PR's whole purpose is
        # to consume the changesets, so the directory is empty by design.
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
        run: |
          # Check for .changeset/*.md files (not config.json, not README)
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README || true)
          if [ -z "$CHANGESETS" ]; then
            echo "No changeset found. Add one with 'pnpm changeset' or 'pnpm changeset --empty' if no release is needed."
            exit 1
          fi

  smoke-macos:
    name: CLI Smoke (macOS)
    runs-on: macos-latest
    needs:
      - validate
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Collect normalized smoke artifact
        run: node scripts/cli-smoke-parity.mjs collect --output ndx-cli-smoke-macos.json

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndx-cli-smoke-macos
          path: ndx-cli-smoke-macos.json

  smoke-windows:
    name: CLI Smoke (Windows)
    runs-on: windows-latest
    needs:
      - validate
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Collect normalized smoke artifact
        run: node scripts/cli-smoke-parity.mjs collect --output ndx-cli-smoke-windows.json

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndx-cli-smoke-windows
          path: ndx-cli-smoke-windows.json

  smoke-parity:
    name: CLI Smoke Parity
    runs-on: ubuntu-latest
    needs:
      - smoke-macos
      - smoke-windows
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download macOS smoke artifact
        uses: actions/download-artifact@v4
        with:
          name: ndx-cli-smoke-macos
          path: smoke-macos

      - name: Download Windows smoke artifact
        uses: actions/download-artifact@v4
        with:
          name: ndx-cli-smoke-windows
          path: smoke-windows

      - name: Compare smoke artifacts
        run: node scripts/cli-smoke-parity.mjs compare --mac smoke-macos/ndx-cli-smoke-macos.json --windows smoke-windows/ndx-cli-smoke-windows.json
