# GitHub Actions — PR validation and main branch CI for n-dx
#
# Replicates the pipeline previously defined in bitbucket-pipelines.yml.
# Steps: install → build → typecheck → PR check (build + rex validate)
#
# Node 22 LTS. Exact pnpm version managed by corepack via packageManager
# field in package.json.
#
# Action versions: checkout@v6, setup-node@v6, pnpm/action-setup@v5 all run
# on Node.js 24. upload-artifact@v4 and download-artifact@v4 are already on
# Node.js 24 and do not require bumping.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # changeset status compares against main to compute the release plan
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check obfuscated code policy
        run: pnpm security:obfuscation

      - name: Build
        run: pnpm build

      - name: Check no source maps in publish
        run: |
          MAPS=""
          for pkg in packages/*/; do
            [ -f "$pkg/package.json" ] || continue
            FOUND=$(cd "$pkg" && pnpm pack --dry-run 2>&1 | grep '\.map$' || true)
            if [ -n "$FOUND" ]; then
              MAPS="$MAPS\n$pkg:\n$FOUND"
            fi
          done
          if [ -n "$MAPS" ]; then
            echo -e "Source map files would be published to npm:\n$MAPS"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Docs build
        run: pnpm docs:build

      - name: PR check
        run: pnpm pr-check

      - name: Run unit tests
        run: pnpm -r run test

      - name: Require changeset
        # Skip on the Changesets release PR: that PR's whole purpose is
        # to consume the changesets, so the directory is empty by design.
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
        run: |
          # Skip if the PR touches no publishable package code. This avoids
          # the empty-changeset trap (a marker changeset added solely to
          # satisfy this rule will later stall the Release run with
          # "All changesets are empty; not creating PR" and block publish).
          PKG_CHANGES=$(git diff --name-only origin/main...HEAD -- 'packages/' ':!packages/*/CHANGELOG.md' ':!packages/*/package.json' || true)
          if [ -z "$PKG_CHANGES" ]; then
            echo "PR touches no package source — skipping changeset requirement."
            exit 0
          fi
          # Check for .changeset/*.md files (not config.json, not README)
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README || true)
          if [ -z "$CHANGESETS" ]; then
            echo "No changeset found. Add one with 'pnpm changeset'."
            exit 1
          fi

      - name: Validate changesets
        # Validates every changeset's front matter against the workspace
        # (catches stale package names like "rex" vs "@n-dx/rex" that would
        # otherwise only fail in the Release workflow after merge to main).
        # --since=origin/main is required because PR checkouts are detached
        # HEAD with no local "main" branch for changeset to diff against.
        run: pnpm exec changeset status --since=origin/main

  smoke-macos:
    name: CLI Smoke (macOS)
    runs-on: macos-latest
    needs:
      - validate
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm -r run test

      - name: Collect normalized smoke artifact
        run: node scripts/cli-smoke-parity.mjs collect --output ndx-cli-smoke-macos.json

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndx-cli-smoke-macos
          path: ndx-cli-smoke-macos.json

  smoke-windows:
    name: CLI Smoke (Windows)
    runs-on: windows-latest
    needs:
      - validate
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Collect normalized smoke artifact
        run: node scripts/cli-smoke-parity.mjs collect --output ndx-cli-smoke-windows.json

      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndx-cli-smoke-windows
          path: ndx-cli-smoke-windows.json

  smoke-parity:
    name: CLI Smoke Parity
    runs-on: ubuntu-latest
    needs:
      - smoke-macos
      - smoke-windows
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download macOS smoke artifact
        uses: actions/download-artifact@v4
        with:
          name: ndx-cli-smoke-macos
          path: smoke-macos

      - name: Download Windows smoke artifact
        uses: actions/download-artifact@v4
        with:
          name: ndx-cli-smoke-windows
          path: smoke-windows

      - name: Compare smoke artifacts
        run: node scripts/cli-smoke-parity.mjs compare --mac smoke-macos/ndx-cli-smoke-macos.json --windows smoke-windows/ndx-cli-smoke-windows.json
