version: '3.9'

services:
  ndx-windows:
    build:
      context: ..
      dockerfile: .local_testing/Dockerfile.windows
    container_name: ndx-windows-test
    environment:
      - NODE_ENV=test
    working_dir: /ndx
    volumes:
      - ./test-results:/ndx/test-results
    entrypoint: powershell
    command: ["-Command", "pnpm test"]

  ndx-macos:
    build:
      context: ..
      dockerfile: .local_testing/Dockerfile.macos
    container_name: ndx-macos-test
    environment:
      - NODE_ENV=test
    working_dir: /ndx
    volumes:
      - ./test-results:/ndx/test-results
    entrypoint: /bin/bash
    command: ["-c", "/ndx/test-base-commands.sh"]
