# Bitbucket Pipelines — PR validation for n-dx
#
# Runs the pr-check script (build + rex validate) on every pull request.
# See pr-check.js for pipeline step details.

# Node 22 LTS — stable runtime for CI. Exact pnpm version managed by
# corepack via the packageManager field in package.json (pnpm@10.28.2).
image: node:22

definitions:
  caches:
    pnpm-store: ~/.local/share/pnpm/store

pipelines:
  pull-requests:
    '**':
      - step:
          name: PR Validation
          size: 2x          # 8 GB RAM — headroom for parallel tsc across 5 packages
          max-time: 20      # minutes — generous ceiling; typical runs finish in < 5 min
          caches:
            - pnpm-store    # content-addressable package store (~/.local/share/pnpm/store)
            - node          # node_modules (built-in Bitbucket cache)
          script:
            - corepack enable
            - pnpm install --frozen-lockfile
            - pnpm pr-check
